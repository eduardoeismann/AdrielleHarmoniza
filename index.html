<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adrielle Harmoniza • Em construção</title>
  <meta name="description" content="Site em construção • Dra. Adrielle Fontoura. Para mais informações, acesse @adrielleharmoniza." />
  <meta name="theme-color" content="#ffffff" />

  <style>
    :root{
      --bg:#ffffff;
      --gold:#b08a2e;
      --gold2:#d6b35a;
      --text:#1a1a1a;
      --muted:#555;
      --line:#ead9b0;
      --radius:16px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: var(--bg);
      color: var(--text);
      display:flex;
      min-height:100vh;
      align-items:center;
      justify-content:center;
      padding:22px;
    }

    .card{
      width:min(560px,100%);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:26px 22px;
      text-align:center;
    }

    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      color:var(--gold);
      font-weight:700;
      font-size:12px;
      letter-spacing:.06em;
      text-transform:uppercase;
    }

    h1{
      margin:14px 0 6px;
      font-size:26px;
      letter-spacing:-0.02em;
    }

    .pro{
      margin:0 0 14px;
      color:var(--muted);
      font-size:14px;
    }

    .cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-top:10px;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid var(--line);
      text-decoration:none;
      color:var(--gold);
      font-weight:800;
      background:linear-gradient(180deg,#fff,#fffaf0);
    }

    .cta:hover{
      outline:2px solid rgba(176,138,46,.18);
    }

    footer{
      margin-top:16px;
      font-size:12px;
      color:#777;
      line-height:1.6;
    }

    .dev{
      margin-top:4px;
    }

    .hyperion{
      color:var(--gold);
      font-weight:600;
    }

    .dot{
      display:inline-block;
      width:9px;height:9px;border-radius:50%;
      background:var(--gold2);
      box-shadow:0 0 0 4px rgba(214,179,90,.25);
      margin-right:6px;
    }
  </style>
</head>

<body>
  <main class="card" role="main">
    <span class="badge"><span class="dot" aria-hidden="true"></span> Em construção</span>

    <h1>Adrielle Harmoniza</h1>
    <p class="pro">Dra. Adrielle Fontoura • Harmonização Facial e Corporal</p>

    <p style="margin:0; color: var(--muted); font-size:14px;">
      Para mais informações e agendamentos, fale conosco pelo Instagram:
    </p>

    <a class="cta" href="https://instagram.com/adrielleharmoniza" target="_blank" rel="noopener">
      @adrielleharmoniza
    </a>

    <footer>
      © <span id="year"></span> Adrielle Harmoniza<br/>
      <span class="dev">
        Desenvolvido por: 
        <span class="hyperion">
          <a href="https://www.hyperionroot.com/" target="_blank" rel="noopener">Hyperion</a>
        </span>
      </span>
    </footer>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
